{% extends 'header_footer_user.html' %}
{% block content %}

	

	  <style type="text/css">
		#customers {
		  font-family: Arial, Helvetica, sans-serif;
		  border-collapse: collapse;
		  width: 80%;
		  margin-left: auto;
    	  margin-right: auto;
    	  margin-bottom: 100px;
    	  margin-top: 	auto;
    	  border: 10px;
		}

		#customers td, #customers th {
		  border: 1px solid #ddd;
		  padding: 8px;
		}

		#customers tr:nth-child(even){background-color: #f2f2f2;color: black;}

		#customers tr:nth-child(odd){background-color: #ddd;color: black;}

		#customers th {
		  padding-top: 12px;
		  padding-bottom: 12px;
		  text-align: left;
		  background-color: black;
		  color: white;
		}

	</style>
	<div class="candidate_cv">
	<div class="services" id="services">
		<div class="container">
			<div class="tittle_head_w3ls">
				<br>
				<h3 class="tittle"><center>Uploaded Notes</center></h3><br><br>
			</div>
			<div class="inner_sec_grids_info_w3ls">
				<fieldset >
					<table id="customers" cellpadding="0" cellspacing="0" border="10">
		<thead>		
		<tr>
		<th style="text-align: center;" >Sl no</th>
		<!-- <th> Currency</th> -->
		<th style="text-align: center;" > Image</th>

		<th style="text-align: center;">Check </th>
	</tr>
         </thead>
         <tbody>
{% for x in var %}

	<tr>
		<td style="text-align: center;" >{{forloop.counter}}</td>

		<td style="text-align: center;" ><a href="{{x.image.url}}" target="_blank"><img src="{{x.image.url}}" height="50px" width="50px"></td>
		
		<td style="text-align: center;" ><a href="/check_currency/?id={{x.id}}"><button>Check</button></a></td>
		
	</tr>

		{% endfor %}
            </tbody>
	

	</table>
		
				</div>
		
				<div class="clearfix"> </div>
			</div>
		</div>
	</div></div>
 {% if error %}
<script type="text/javascript">
  swal("Error!", "{{error}}", "error");
</script>
{% endif %}

{% if success %}
<script type="text/javascript">
  swal("Congrats!", "{{success}}", "success");
</script>
{% endif %}

{% if info %}
<script type="text/javascript">
  swal("Information!", "{{info}}", "info");
</script>
{% endif %}
{% endblock %}
